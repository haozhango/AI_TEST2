<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAPS Jobs Console Platform</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <h1>HAPS Jobs Console Platform</h1>

    <section class="panel panel-new">
      <div class="header-row">
        <h2>Create Jobs</h2>
      </div>
      <form id="newJobsForm">
        <div id="newJobsList"></div>
        <div class="submit-row">
          <label class="timing-setting">
            <span class="timing-label">Jobs Duration</span>
            <select id="jobsDurationMinutes"></select>
          </label>
          <label class="auto-finish-setting">
            <input id="autoFinishEnabled" type="checkbox" checked />
            <span>Auto Finish on timeout</span>
          </label>
          <button id="submitBtn" type="submit">Submit</button>
        </div>
      </form>
    </section>

    <section class="panel panel-waiting">
      <h2>Waiting Jobs</h2>
      <div id="waitingJobs"></div>
    </section>

    <section class="panel panel-recent">
      <h2>Recent Jobs</h2>
      <div id="recentJobs"></div>
    </section>
  </main>

  <template id="newJobTemplate">
    <div class="job-card row-grid">
      <label class="field"><span class="key">JobsID</span><input name="jobs_id" readonly /></label>
      <label class="field"><span class="key">HAPS Platform</span>
        <select name="haps_platform">
          <option value="BJ-HAPS80">BJ-HAPS80</option>
          <option value="CD-HAPS80">CD-HAPS80</option>
          <option value="CD-HAPS100">CD-HAPS100</option>
        </select>
      </label>

      <div class="field database-field">
        <span class="key">DataBase</span>
        <div class="stacked">
          <div class="inline-control">
            <label class="config-toggle" title="Enable database_path"><input type="checkbox" class="db-config-toggle" data-target="database_path" checked /></label>
            <input name="database_path" class="database-path" placeholder="DataBase Path (auto)" />
            <div class="dropdown-wrap">
              <button type="button" class="mini-btn database-browse-btn" title="Browse DataBase path">▾</button>
            </div>
          </div>
          <div class="inline-control">
            <label class="config-toggle" title="Enable reset_script"><input type="checkbox" class="db-config-toggle" data-target="reset_script" checked /></label>
            <input name="reset_script" class="reset-script-path" placeholder="Reset Script Path (auto)" />
            <div class="dropdown-wrap">
              <button type="button" class="mini-btn reset-browse-btn" title="Browse reset script path">▾</button>
            </div>
          </div>
          <div class="inline-control">
            <label class="config-toggle" title="Enable imgload_script"><input type="checkbox" class="db-config-toggle" data-target="imgload_script" checked /></label>
            <input name="imgload_script" class="imgload-script-path" placeholder="ImgLoad Script Path (auto)" />
            <div class="dropdown-wrap">
              <button type="button" class="mini-btn imgload-browse-btn" title="Browse imgload script path">▾</button>
            </div>
          </div>
        </div>
      </div>

      <div class="field binfile-field">
        <span class="key">BinFile</span>
        <div class="stacked">
          <div class="inline-control">
            <input name="binfile" class="binfile-path" placeholder="/path/to/xxx.bin" />
            <div class="dropdown-wrap">
              <button type="button" class="mini-btn browse-btn" title="Browse binfile path">▾</button>
            </div>
          </div>
          <div class="inline-control">
            <input name="img_file" class="img-file-path" placeholder="IMG File path" />
            <div class="dropdown-wrap">
              <button type="button" class="mini-btn img-file-browse-btn" title="Browse IMG file path">▾</button>
            </div>
          </div>
        </div>
      </div>

      <div class="field uart-field">
        <button type="button" class="key key-btn add-uart-btn">UART</button>
        <div class="uart-list"></div>
      </div>

      <div class="field openocd-field">
        <span class="key">OpenOCD Cfg</span>
        <div class="stacked">
          <input name="openocd_tool_path" placeholder="tool path: /opt/openocd/bin/openocd" />
          <input name="openocd_cfg_file" placeholder="cfg file: /opt/openocd/board.cfg" />
        </div>
      </div>

      <label class="field"><span class="key">Log Path</span><input name="log_path" placeholder="/tmp/job.log" /></label>

      <div class="row-actions">
        <button class="delete-btn" type="button" title="Delete item">×</button>
        <button class="add-btn" type="button" title="Add next item">+</button>
      </div>
    </div>
  </template>

  <template id="uartTemplate">
    <div class="uart-item">
      <input class="uart-input" placeholder="/dev/ttyUSB0" />
      <button type="button" class="remove-uart-btn">×</button>
    </div>
  </template>

  <script src="/static/main.js"></script>
</body>
</html>
