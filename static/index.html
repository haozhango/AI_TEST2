<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Console</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <h1>Job Console</h1>
    <p class="tip">Please use the latest <strong>Chrome</strong> or <strong>Firefox</strong> for best compatibility.</p>

    <section>
      <div class="header-row">
        <h2>New Jobs</h2>
        <button id="addJobBtn" type="button">+ Add Row</button>
      </div>
      <form id="newJobsForm">
        <div id="newJobsList"></div>
        <button id="submitBtn" type="submit">Submit</button>
      </form>
    </section>

    <section>
      <h2>Recent Jobs</h2>
      <div id="recentJobs"></div>
    </section>
  </main>

  <template id="newJobTemplate">
    <div class="job-card one-line">
      <label>Bitfile <input name="bitfile" required /></label>
      <label>Binfile <input name="binfile" /></label>
      <label>Log Path <input name="log_path" placeholder="/tmp/job.log" /></label>
      <label>OpenOCD Path <input name="openodc_path" placeholder="/opt/openocd/bin/openocd" /></label>
      <label>UART1 <input name="uart1" /></label>
      <label>UART2 <input name="uart2" /></label>
      <label>UART3 <input name="uart3" /></label>
      <label>UART4 <input name="uart4" /></label>
      <button class="remove-btn" type="button">Remove</button>
    </div>
  </template>

  <script src="/static/main.js"></script>
</body>
</html>
